name: Debatt-agent

on:
  schedule:
    - cron: "0 7 * * *"   # Kl 07:00 UTC (09:00 svensk tid)
    - cron: "0 11 * * *"  # Kl 11:00 UTC (13:00 svensk tid)
    - cron: "0 15 * * *"  # Kl 15:00 UTC (17:00 svensk tid)
    - cron: "0 19 * * *"  # Kl 19:00 UTC (21:00 svensk tid)
  workflow_dispatch:       # Kan också köras manuellt från GitHub

jobs:
  publicera:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install anthropic httpx

      - name: Kör agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEBATT_API_KEY: ${{ secrets.DEBATT_API_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python agent.py
