name: Backtest (fetch + strategi)

on:
  schedule:
    - cron: "0 5 * * *"   # Varje dag kl 05:00 UTC (07:00 svensk tid)
  workflow_dispatch:       # Kan köras manuellt

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install httpx yfinance

      - name: Hämta prisdata från Yahoo Finance → ohlcv_cache
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python backtest_fetch.py

      - name: Kör strategioptimering → backtest_resultat
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python backtest.py
