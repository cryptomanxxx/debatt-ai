name: Veckans digest

on:
  schedule:
    - cron: "0 8 * * 1"  # Varje måndag kl 08:00 UTC (10:00 svensk tid)
  workflow_dispatch:      # Kan också köras manuellt

jobs:
  skicka-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Skicka nyhetsbrev
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          PAYLOAD=$(jq -n --arg s "$ADMIN_SECRET" '{"secret":$s}')
          RESPONSE=$(curl -s -X POST https://www.debatt-ai.se/api/digest \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "prenumeranter\|Inga"
